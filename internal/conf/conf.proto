syntax = "proto3";
package kratos.api;

option go_package = "github.com/go-kratos/kratos-layout/internal/conf;conf";

import "google/protobuf/duration.proto";

message Bootstrap {
  Server server = 1;
  Data data = 2;
  Log log = 3;
  Telemetry telemetry = 4;
}

message Telemetry {
  string otlp_endpoint = 1;
  // Sampling rate for new root spans (0.0 ~ 1.0).
  // When a request has an upstream trace header, the upstream decision is
  // always respected (via ParentBased). This rate only applies when there
  // is no upstream — e.g. cron jobs, message consumers, or direct gRPC calls.
  // Defaults to 1.0 (AlwaysSample) when unset or zero.
  double sampling_rate = 2;
}

message Log {
  string format = 1;
  string level = 2;
  bool add_source = 3;
  string output_path = 4;
}

message Server {
  message HTTP {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  message GRPC {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  message Pprof {
    bool enabled = 1;
    string addr = 2;
  }
  HTTP http = 1;
  GRPC grpc = 2;
  Pprof pprof = 3;
}

message Data {
  message Database {
    string driver = 1;
    string source = 2;
    // Connection pool settings. Zero / unset means use the code-level default.
    int32 max_open_conns = 3;              // max open connections, default 25
    int32 max_idle_conns = 4;              // max idle connections, default 10
    google.protobuf.Duration conn_max_lifetime = 5;  // max connection lifetime, default 300s
    google.protobuf.Duration conn_max_idle_time = 6; // max connection idle time, default 60s
  }
  message Redis {
    string network = 1;
    string addr = 2;
    string password = 3;
    int32 db = 4;
    google.protobuf.Duration dial_timeout = 5;
    google.protobuf.Duration read_timeout = 6;
    google.protobuf.Duration write_timeout = 7;
    int32 pool_size = 8;
  }
  Database database = 1;
  Redis redis = 2;
}
