server:
  http:
    addr: 0.0.0.0:8000
    timeout: 1s
  grpc:
    addr: 0.0.0.0:9000
    timeout: 1s
data:
  database:
    driver: mysql
    source: root:root@tcp(127.0.0.1:3306)/test?parseTime=True&loc=Local
  redis:
    addr: 127.0.0.1:6379
    read_timeout: 0.2s
    write_timeout: 0.2s
log:
  format: json
  level: info
  add_source: true
  # output_path: ""
telemetry:
  otlp_endpoint: ""
  # otlp_endpoint: "tempo:4317"  # 生产环境配置 Tempo OTLP collector 地址
